name: Build and Release Extension

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write
    actions: read
    checks: write

jobs:
    build:
        name: Build extension artifacts
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10
                  cache: true
            - name: Install dependencies
              run: pnpm install

            - name: Build WebExtension (pnpm zip & zip:firefox)
              run: |
                  pnpm zip
                  pnpm zip:firefox
            - run: |
                  ls -a
                  ls -a .output
            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: extension-artifacts
                  path: |
                      .output/*
                      !.output/*sources.zip
                  include-hidden-files: true
    release:
        name: Create/Update release and upload assets
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v8
              with:
                  name: extension-artifacts
                  path: artifacts
                  include-hidden-files: true

            - name: Create or update latest release
              id: release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: latest
                  name: latest
                  body: Release built from commit ${{ github.sha }}
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - run: find ./
            - name: Upload assets to release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: latest
                  working_directory: artifacts
                  files: ./*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
